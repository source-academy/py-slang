name: python-package

# Tests the CPython `sicp` library in `python/` on every change to it, and
# publishes it to PyPI (as `sourceacademy-sicp`) when a GitHub Release is
# published. Publishing is deliberate and release-gated — never on a push.

on:
  push:
    paths:
      - "python/**"
      - ".github/workflows/python-package.yml"
  pull_request:
    paths:
      - "python/**"
      - ".github/workflows/python-package.yml"
  release:
    types: [published]

defaults:
  run:
    working-directory: python

jobs:
  test:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pytest build
      - name: Run tests
        run: python -m pytest -q
      - name: Build wheel + sdist
        run: python -m build

  publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC) — configure a trusted publisher for the
    # `sourceacademy-sicp` project on PyPI pointing at this repo/workflow, or
    # swap the publish step for a token-based upload using a PYPI_API_TOKEN secret.
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build pytest
      - run: python -m pip install -e .
      - name: Run tests before publishing
        run: python -m pytest -q
      - name: Build wheel + sdist
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
